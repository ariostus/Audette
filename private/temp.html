<!DOCTYPE html>
<html>

<head>
  <title>Audette</title>
  <link rel="stylesheet" type="text/css" href="./style.css">
  <link rel="stylesheet" type="text/css" href="./glass.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Parisienne&display=swap"
    rel="stylesheet">

  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />


</head>

<body>
  <div id="background"></div>
  <div id="circle1" class="circle"></div>
  <!-- <div class="gradient-box"></div> -->
  <div id="circle2" class="circle"></div>
  <div id="circle3" class="circle"></div>

  <div id="big-container">
    <div class="header">
      <div class="header-side glass">
        <h2 id="audette">Audette</h2>
      </div>
      <div class="glass" id="header-center">
        <span class="inline-icon-search material-symbols-outlined">search</span>
        <input id="artistSearchBar" type=text class="search-bar" placeholder="Search any artist..."></input>
      </div>
      <div class="header-side glass glass-button glass-round" id="header-right">
        <button onclick="" class="material-symbols-outlined" style="position: absolute;">home</button>
      </div>
      <div class="header-side glass glass-button glass-round" id="header-right2">
        <button onclick="" class="material-symbols-outlined" style="position: absolute;">settings</button>
      </div>
    </div>

    <div id="container">

      <div id="library-container">
        <h2 id="library-title" class="glass">Library</h2>
        <div id="libraryOuter" class="glass">
          <div id="library"></div>
        </div>
      </div>

      <div id="main-container" class="glass">
        <div id="main" class="main">
          <div id="main-info-div" class="glass">
            <h3 id="main-info">Info </h3>
          </div>
        </div>
        <!-- <div id="tracksDiv" style="visibility: hidden"></div> -->
      </div>
    </div>
    <!-- <div id="footer-container" class="glass"> -->
    <!-- <div class="footer">Footer</div> -->
    <!-- </div> -->
  </div>
  <svg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'>
    <filter id='noiseFilter'>
      <feTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch' />
    </filter>

    <rect width='100%' height='100%' filter='url(#noiseFilter)' />
  </svg>

</body>

<script src="/private/config.js"></script>
<script src="/private/interface.js"></script>
<script src="/private/tools.js"></script>
<script src="/private/classes.js"></script>
<script src="/private/script.js"></script>






</html>
