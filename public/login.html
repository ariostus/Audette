<!DOCTYPE html>
<html>

<head>
  <title>Hello world</title>
  <link rel="stylesheet" href="glass.css">
  <link rel="stylesheet" href="login-style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Parisienne&display=swap"
    rel="stylesheet">

</head>


<body>
  <div class="glass" id="main">
    <h2>Audette</h2>
    <div id="dialog">Please log in to your account</div>
    <div id="error"></div>
    <form action="/login" method="POST" id="form">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" class="input-field" id="username" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" class="input-field" id="password" />
      </div>
      <input type="submit" value="Log in" class="glass glass-button" id="submit" />
    </form>

  </div>
  <div id="circle1" class="circle"></div>
  <!-- <div class="gradient-box"></div> -->
  <div id="circle2" class="circle"></div>
  <div id="circle3" class="circle"></div>

  <script>
    const username = document.querySelector("#username");
    const password = document.querySelector("#password");
    const form = document.querySelector("#form");
    const error = document.querySelector("#error");

    username.addEventListener("keypress", (e) => {
      if (e.key == "Enter") {
        e.preventDefault();
        password.focus();
      }
    })

    let cookie = document.cookie;
    let text = decodeURI(cookie).split("=")[1].replace("%2F", "/")
    if (text != "undefined") {
      error.innerHTML = text;
    }

  </script>
</body>


</html>
